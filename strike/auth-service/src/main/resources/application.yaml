server:
  port: 8081

spring:
  application:
    name: auth-service



  datasource:
    url: jdbc:postgresql://localhost:5432/strike_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: UTC

jwt:
  secret: STRIKE_SUPER_SECRET_KEY_2026_STRIKE_PLATFORM
  expiration: 3600000          # 1 hour
  refresh-expiration: 2592000000  # 30 days

services:
  user-url: http://localhost:8082
  vendor-url: http://localhost:8083
  admin-url: http://localhost:8087
  notification-url: http://localhost:8088