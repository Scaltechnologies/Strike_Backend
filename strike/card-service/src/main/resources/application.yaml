server:
  port: 8084

spring:
  application:
    name: card-service

  datasource:
    url: jdbc:postgresql://localhost:5432/strike_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  jackson:
    time-zone: UTC

jwt:
  secret: STRIKE_SUPER_SECRET_KEY_2026_STRIKE_PLATFORM

services:
  ledger-url: http://localhost:8086
  admin-url: http://localhost:8087
  notification-url: http://localhost:8088

scheduler:
  expiry-cron: "0 0 * * * *"   # every hour at :00 — override in prod if needed