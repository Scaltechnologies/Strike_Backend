
  server:
    port: 8082

  spring:
    application:
      name: user-service

    datasource:
      url: jdbc:postgresql://localhost:5432/strike
      username: strike_user
      password: postgres123
      driver-class-name: org.postgresql.Driver

      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        idle-timeout: 30000
        max-lifetime: 1800000
        connection-timeout: 20000

    jpa:
      hibernate:
        ddl-auto: update
      open-in-view: false
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true
          default_schema: user_service

    jackson:
      time-zone: UTC

