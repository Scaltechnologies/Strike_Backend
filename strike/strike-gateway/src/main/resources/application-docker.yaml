spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/user/**

            - id: vendor-service
              uri: http://vendor-service:8083
              predicates:
                - Path=/api/vendor/**,/api/stores/**,/api/menu/**,/api/dashboard/**,/api/analytics/**

            - id: card-service
              uri: http://card-service:8084
              predicates:
                - Path=/api/cards/**,/api/subscriptions/**

            - id: redemption-service
              uri: http://redemption-service:8085
              predicates:
                - Path=/api/redemptions/**

            - id: ledger-service
              uri: http://ledger-service:8086
              predicates:
                - Path=/api/ledger/**

            - id: admin-service
              uri: http://admin-service:8087
              predicates:
                - Path=/api/admin/**